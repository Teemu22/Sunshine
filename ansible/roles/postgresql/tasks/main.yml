  - name: Install PostgreSQL
    apt:
      name: postgresql
      state: present
      update_cache: yes

  - name: Ensure PostgreSQL is running
    service:
      name: postgresql
      state: started

  - name: Enable PostgreSQL on boot
    service:
      name: postgresql
      enabled: yes

  - name: Set listen_addresses in PostgreSQL config
    lineinfile:
      path: /etc/postgresql/17/main/postgresql.conf
      line: "listen_addresses = '*'"
      create: yes
    notify: restart postgresql
